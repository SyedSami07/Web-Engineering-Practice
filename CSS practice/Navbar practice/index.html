<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar 1</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
        }

        nav{
            display: flex;
            justify-content: space-between;
            padding: 20px 8%;
            width: 100%;
            background: rgb(9, 45, 68);
        }
        .nav-links{
            list-style: none;
            display: flex;
            gap: 25px;
            cursor: pointer;
        }

        .logo{
            cursor: pointer;
            color: aqua;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            
        }
        .logo:hover{
            color: white;
            transform: scale(1.05);
        }
        .nav-links li a{
            position: relative;
            color: white;
            text-decoration: none;
            display: grid;
            margin-top: 5px;
        }

        .nav-links li a:hover{
            color: aqua;
        }
        
        .login-btn{
            padding: 12px 28px;
            border: 1px solid aqua;
            border-radius: 10px;
            background:rgba(255,255,255,.15);
            backdrop-filter: blur(10px);
            color: white;
            cursor: pointer;
            transition: .3s;
        }
        .login-btn:hover{
            background-color: rgb(0, 108, 180);
            transform: scale(1.05);
        }
    </style>

</head>
<body>
    <nav>
        <div class="logo">Hieses</div>
        <ul class="nav-links">
            <li><a href="">Home</a></li>
            <li><a href="">Services</a></li>
            <li><a href="">Portfolio</a></li>
            <li><a href="">About</a></li>
        </ul>
        <div >
            <button class="login-btn">Login</button>
        </div>
    </nav>
</body>
</html>
